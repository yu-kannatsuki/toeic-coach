<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Coach Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8">
    <main class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold text-center">TOEIC Coach</h1>

        <section id="dashboard" class="card p-6 border-t-4 border-indigo-600">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Dashboard</h2>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="number" id="curScore" placeholder="現在" class="border rounded-lg p-2">
                <input type="number" id="tarScore" placeholder="目標" class="border rounded-lg p-2">
            </div>
            <button onclick="saveScore()" class="w-full bg-slate-800 text-white py-2 rounded-lg font-bold">目標を更新</button>
            <div class="mt-4 bg-slate-100 h-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-600 h-full w-0 transition-all duration-700"></div>
            </div>
            <p id="gap-text" class="text-xs text-slate-500 mt-2 text-right">目標まであと --- 点</p>
        </section>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="startQuiz('part5')" class="card p-6 text-center hover:bg-indigo-50 transition">
                <div class="text-2xl mb-1">📝</div>
                <p class="font-bold text-sm">問題演習</p>
            </button>
            <button onclick="startVocabQuiz()" class="card p-6 text-center hover:bg-yellow-50 transition">
                <div class="text-2xl mb-1">⭐</div>
                <p class="font-bold text-sm">単語帳復習</p>
            </button>
        </div>

        <div id="quiz-area" class="hidden card p-6 space-y-4">
            <div id="question-text" class="text-base font-medium"></div>
            <div id="options-box" class="grid gap-2"></div>
            <div id="explanation-box" class="hidden bg-slate-50 p-4 rounded-lg border">
                <p id="explanation-text" class="text-sm text-slate-600"></p>
                <div class="flex gap-2 mt-4">
                    <button onclick="addToVocab()" class="bg-amber-100 text-amber-700 px-4 py-2 rounded font-bold text-sm">★保存</button>
                    <button onclick="nextQuestion()" class="bg-indigo-600 text-white flex-1 py-2 rounded font-bold text-sm">次へ</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 【ここに問題を追加していきます】
        const BANK = {
            part5: [
                { id: 1, en: "The CEO ------- the meeting yesterday.", options: ["attend", "attends", "attended", "attending"], correct: 2, exp: "昨日なので過去形のattendedが正解です。" },
                { id: 2, en: "We need to ------- the budget.", options: ["review", "reviews", "reviewed", "reviewing"], correct: 0, exp: "to不定詞なので動詞の原形reviewです。" }
            ]
        };

        let currentQuiz = [], index = 0;

        function saveScore() {
            const cur = document.getElementById('curScore').value;
            const tar = document.getElementById('tarScore').value;
            localStorage.setItem('toeic_data', JSON.stringify({ cur, tar }));
            updateDashboard();
        }

        function updateDashboard() {
            const d = JSON.parse(localStorage.getItem('toeic_data') || '{"cur":400,"tar":700}');
            document.getElementById('curScore').value = d.cur;
            document.getElementById('tarScore').value = d.tar;
            const progress = ((d.cur - 200) / (d.tar - 200) * 100);
            document.getElementById('progress-bar').style.width = Math.min(progress, 100) + "%";
            document.getElementById('gap-text').innerText = `目標まであと ${d.tar - d.cur} 点`;
        }

        function startQuiz(mode) {
            currentQuiz = BANK[mode] || [];
            index = 0;
            document.getElementById('quiz-area').classList.remove('hidden');
            showQuestion();
        }

        function startVocabQuiz() {
            const list = JSON.parse(localStorage.getItem('myVocab') || '[]');
            if(list.length === 0) return alert("まだ単語帳に登録がありません");
            currentQuiz = list;
            index = 0;
            document.getElementById('quiz-area').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuiz[index];
            document.getElementById('question-text').innerText = q.en;
            document.getElementById('explanation-box').classList.add('hidden');
            const box = document.getElementById('options-box'); box.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "text-left p-3 border rounded-lg hover:bg-slate-50";
                btn.innerText = opt;
                btn.onclick = () => {
                    document.getElementById('explanation-box').classList.remove('hidden');
                    document.getElementById('explanation-text').innerText = (i === q.correct ? "正解！ " : "不正解... ") + q.exp;
                };
                box.appendChild(btn);
            });
        }

        function addToVocab() {
            let list = JSON.parse(localStorage.getItem('myVocab') || '[]');
            if(!list.find(q => q.id === currentQuiz[index].id)) {
                list.push(currentQuiz[index]);
                localStorage.setItem('myVocab', JSON.stringify(list));
                alert("登録しました！");
            }
        }

        function nextQuestion() {
            index++;
            if(index < currentQuiz.length) showQuestion();
            else { alert("終了！"); location.reload(); }
        }

        window.onload = updateDashboard;
    </script>
</body>
</html>
